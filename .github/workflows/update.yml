name: Deploy PR Dashboard

on:
  push:
    branches: [main]
    paths-ignore:
      - "config.json"
      - "README.md"
  schedule:
    - cron: "0 * * * *" # Every hour
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Personalize for repo owner
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.repository }}"
          REPO_SHORT="${REPO_NAME#*/}"
          PAGES_URL="https://${OWNER}.github.io/${REPO_SHORT}/"

          # Update config.json
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
            config.github_user = '${OWNER}';
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2) + '\n');
          "

          # Update README dashboard link
          sed -i "s|\*\*PR Dashboard\*\*:.*|**PR Dashboard**: [${OWNER}.github.io/${REPO_SHORT}](${PAGES_URL})|" README.md

          # Commit and push if anything changed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Update dashboard for ${OWNER}"
            git push
          fi

      - name: Fetch PR data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_USER: ${{ github.repository_owner }}
        run: mkdir -p data && node scripts/fetch-prs.js

      - uses: actions/configure-pages@v5
        id: pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-24.04-arm
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
